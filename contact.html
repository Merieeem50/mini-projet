<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact — SiyaraGo</title>
  <style>
    :root {
      --primary: #0D0D0D;
      --accent:  #C9A84C;
      --light:   #F7F5F0;
      --mid:     #6B6B6B;
      --dark:    #1A1A1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── NAVBAR ── */
    .navbar {
      width: calc(100% - 40px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background-color: var(--dark);
      padding: 20px 40px;
      margin: 20px;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
      position: sticky;
      top: 10px;
      z-index: 1000;
      border-radius: 20px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-brand {
      font-size: 28px;
      font-weight: bold;
      color: var(--light);
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .nav-brand-ext {
      color: var(--accent);
      font-size: 16px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 30px;
      flex-shrink: 0;
    }

    .nav-links a {
      color: var(--light);
      text-decoration: none;
      font-size: 17px;
      font-weight: 500;
      padding: 7px 0;
      position: relative;
      transition: color 0.3s ease;
      font-family: 'Segoe UI', sans-serif;
      white-space: nowrap;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0%;
      height: 3px;
      background-color: var(--accent);
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after { width: 100%; }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
      font-weight: 900;
    }

    /* ── CONTACT CONTAINER ── */
    .contact-container {
      width: 100%;
      max-width: 600px;
      margin: 30px auto 50px;
      background: var(--dark);
      padding: 40px 35px;
      border-radius: 16px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      box-shadow: 0 8px 30px rgba(201, 168, 76, 0.15);
    }

    .contact-container h2 {
      text-align: center;
      color: var(--accent);
      font-family: 'Times New Roman', Times, serif;
      font-size: 28px;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    label {
      display: block;
      color: var(--light);
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }

    input, textarea {
      width: 100%;
      padding: 12px 15px;
      margin: 5px 0 18px;
      background: #2a2a2a;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 8px;
      color: var(--light);
      font-size: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      outline: none;
      box-sizing: border-box;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    input::placeholder, textarea::placeholder {
      color: var(--mid);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 5px;
      background: var(--accent);
      color: var(--dark);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 0.5px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    button:hover {
      background: #b8902e;
      box-shadow: 0 4px 14px rgba(201, 168, 76, 0.4);
    }

    /* ── INFO CONTACT ── */
    .contact-info {
      margin-top: 30px;
      border-top: 1px solid rgba(201, 168, 76, 0.2);
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-info p {
      color: var(--mid);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .contact-info p span {
      color: var(--accent);
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-wrap: wrap;
        gap: 12px;
        padding: 15px 20px;
        margin: 10px;
        width: calc(100% - 20px);
      }
      .nav-links { gap: 15px; flex-wrap: wrap; }
      .contact-container { margin: 20px 15px 40px; padding: 25px 20px; }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-logo">
      <img src="./img/new logo.png" alt="Logo SiyaraGo" style="height: 50px;">
      <span class="nav-brand">SiyaraGo<span class="nav-brand-ext">.ma</span></span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="voiture.html">Voitures</a></li>
      <li><a href="reservation.html">Réserver</a></li>
      <li><a href="apropos.html">À propos</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="contact-container">
    <h2>📬 Contactez-nous</h2>

    <label>Votre nom</label>
    <input type="text" id="nom" placeholder="Ex: Mariam El Idrissi" required>

    <label>Votre email</label>
    <input type="email" id="email" placeholder="Ex: mariam@email.com" required>

    <label>Votre message</label>
    <textarea id="message" rows="5" placeholder="Écrivez votre message ici..."></textarea>

    <button onclick="envoyer()">✉️ Envoyer le message</button>

    <div class="contact-info">
      <p>📍 <span>Adresse :</span> Agadir, Maroc</p>
      <p>📞 <span>Téléphone :</span> +212 6XX XX XX XX</p>
      <p>📧 <span>Email :</span> contact@siyarago.ma</p>
    </div>
  </div>

  <script>
    function envoyer(){
      const nom     = document.getElementById("nom").value.trim();
      const email   = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if(nom === ""){
        alert("⚠️ Veuillez entrer votre nom !");
        return;
      }
      if(email === ""){
        alert("⚠️ Veuillez entrer votre email !");
        return;
      }
      if(!emailRegex.test(email)){
        alert("❌ Email non valide !");
        return;
      }
      if(message === ""){
        alert("⚠️ Veuillez entrer votre message !");
        return;
      }

      alert("✅ Message envoyé avec succès ! Nous vous répondrons très bientôt 🙏");

      // Reset form
      document.getElementById("nom").value = "";
      document.getElementById("email").value = "";
      document.getElementById("message").value = "";
    }
  </script>

</body>
</html>
