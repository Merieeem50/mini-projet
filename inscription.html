<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription — SiyaraGo</title>
  <style>
    :root {
      --primary: #0D0D0D;
      --accent:  #C9A84C;
      --light:   #F7F5F0;
      --mid:     #6B6B6B;
      --dark:    #1A1A1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;  /* ✅ FIX principal */
      align-items: center;
    }

    /* ── NAVBAR ── */
    .navbar {
      width: calc(100% - 40px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      flex-wrap: nowrap;
      background-color: var(--dark);
      padding: 20px 40px;
      margin: 20px;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
      position: sticky;
      top: 10px;
      z-index: 1000;
      border-radius: 20px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-brand {
      font-size: 28px;
      font-weight: bold;
      color: var(--light);
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .nav-brand-ext {
      color: var(--accent);
      font-size: 16px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 30px;
      flex-shrink: 0;
    }

    .nav-links a {
      color: var(--light);
      text-decoration: none;
      font-size: 17px;
      font-weight: 500;
      padding: 7px 0;
      position: relative;
      transition: color 0.3s ease;
      font-family: 'Segoe UI', sans-serif;
      white-space: nowrap;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0%;
      height: 3px;
      background-color: var(--accent);
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after { width: 100%; }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
      font-weight: 900;
    }

    /* ── FORM PAGE ── */
    .page {
      background: var(--dark);
      padding: 40px 35px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(201, 168, 76, 0.2);
      border: 1px solid rgba(201, 168, 76, 0.3);
      width: 100%;
      max-width: 400px;
      margin: 30px auto 50px;  /* ✅ margin au lieu de centrage par flex */
    }

    h2 {
      text-align: center;
      color: var(--accent);
      margin-bottom: 25px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: var(--light);
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 8px;
      font-size: 15px;
      background: #2a2a2a;
      color: var(--light);
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      box-sizing: border-box;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    input::placeholder {
      color: var(--mid);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      background: var(--accent);
      color: var(--dark);
      border: none;
      border-radius: 25px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Times New Roman', Times, serif;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: #b8902e;
      box-shadow: 0 4px 14px rgba(201, 168, 76, 0.4);
    }
    .divider {
  text-align: center;
  color: var(--mid);
  font-size: 13px;
  margin: 20px 0;
  position: relative;
}

.divider::before,
.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 38%;
  height: 1px;
  background: rgba(201, 168, 76, 0.2);
}

.divider::before { left: 0; }
.divider::after  { right: 0; }

.links {
  text-align: center;
  margin-top: 5px;
}

.links a {
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
  transition: opacity 0.3s ease;
}

.links a:hover { opacity: 0.75; }

    #success-section {
      display: none;
      margin-top: 20px;
      text-align: center;
      color: var(--accent);
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-wrap: wrap;
        gap: 12px;
        padding: 15px 20px;
        margin: 10px;
        width: calc(100% - 20px);
      }
      .nav-links { gap: 15px; flex-wrap: wrap; }
      .page { margin: 20px 15px 40px; padding: 25px 20px; }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-logo">
      <img src="./img/new logo.png" alt="Logo SiyaraGo" style="height: 50px;">
      <span class="nav-brand">SiyaraGo<span class="nav-brand-ext">.ma</span></span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="voiture.html">Voitures</a></li>
      <li><a href="reservation.html">Réserver</a></li>
      <li><a href="apropos.html">À propos</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="page">
    <h2>✨ Créer un compte</h2>

    <div id="form-section">
      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" placeholder="Votre prénom">
      </div>

      <div class="form-group">
        <label for="nom">Nom</label>
        <input type="text" id="nom" placeholder="Votre nom">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="exemple@gmail.com">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Mot de passe">
      </div>

      <div class="form-group">
        <label for="confirm">Confirmer le mot de passe</label>
        <input type="password" id="confirm" placeholder="Répétez le mot de passe">
      </div>

      <button onclick="inscrire()">Créer mon compte</button>
    </div>
    <div class="divider">ou</div>

    <div class="links">
      <a href="connexion.html">J'ai déjà un compte → Se connecter</a>
    </div>

    <div id="success-section">
      <p id="success-msg"></p>
    </div>
  </div>

  <script>
    function inscrire() {
      let prenom   = document.getElementById("prenom").value.trim();
      let nom      = document.getElementById("nom").value.trim();
      let email    = document.getElementById("email").value.trim();
      let password = document.getElementById("password").value;
      let confirm  = document.getElementById("confirm").value;

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!prenom || !nom || !email || !password || !confirm) {
        alert("⚠️ Veuillez remplir tous les champs !");
        return;
      }
      if (!emailRegex.test(email)) {
        alert("❌ Email non valide !");
        return;
      }
      if (password.length < 6) {
        alert("⚠️ Le mot de passe doit contenir au moins 6 caractères !");
        return;
      }
      if (password !== confirm) {
        alert("❌ Les mots de passe ne correspondent pas !");
        return;
      }

      document.getElementById("form-section").style.display = "none";
      document.getElementById("success-section").style.display = "block";
      document.getElementById("success-msg").innerHTML =
        "🎉 Bienvenue <strong>" + prenom + " " + nom + "</strong> !<br><br>" +
        "<span style='color:var(--mid);font-size:14px;'>Votre compte a été créé avec succès.</span><br><br>" +
        "<a href='index.html' style='color:var(--accent);text-decoration:none;font-size:15px;'>← Retour à l'accueil</a>";
    }
  </script>

</body>
</html>
