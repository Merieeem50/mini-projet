<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription simple</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      min-height: 100vh;
    }

    .page {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      width: 350px;
    }

    h2 {
      text-align: center;
      color: #5E1E2B; /* oxblood */
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #202020; /* obsidian */
    }

    input {
      width: 100%;
      padding: 10px;
      border: 2px solid #9C9D9B; /* concrete */
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #5E1E2B; /* oxblood */
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #7a2535;
    }

    #success-section {
      display: none;
      margin-top: 20px;
      text-align: center;
      color: #2d6a4f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <nav class="navbar">
  <div class="nav-logo">
    <img src="./img/logo.png" alt="Logo" style="height: 55px;">
    <span class="nav-brand">SiyaraGo<span class="nav-brand-ext">.ma</span></span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="voiture.html">Voitures</a></li>
    <li><a href="reservation.html">Réserver</a></li>
    <li><a href="apropos.html">À propos</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  
</nav>

<div class="page ">
  <h2>Créer un compte</h2>

  <div id="form-section">
    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" placeholder="Votre prénom">
    </div>

    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" placeholder="Votre nom">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="exemple@gmail.com">
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Mot de passe">
    </div>

    <div class="form-group">
      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="Répétez le mot de passe">
    </div>

    <button onclick="inscrire()">Créer mon compte</button>
  </div>

  <div id="success-section">
    <p id="success-msg"></p>
  </div>
</div>

<script>
function inscrire() {
  let prenom   = document.getElementById("prenom").value;
  let nom      = document.getElementById("nom").value;
  let email    = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let confirm  = document.getElementById("confirm").value;

 
  if (!prenom || !nom || !email || !password) {
    alert("Veuillez remplir tous les champs !");
    return;
  }
  if (password !== confirm) {
    alert("Les mots de passe ne correspondent pas !");
    return;
  }


  document.getElementById("form-section").style.display = "none";
  document.getElementById("success-section").style.display = "block";
  document.getElementById("success-msg").innerText = "Bienvenue " + prenom + " !";
}
</script>

</body>
</html>
