<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription simple</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    :root {
  --primary:   #0D0D0D;
  --accent:    #C9A84C;
  --light:     #F7F5F0;
  --mid:       #6B6B6B;
  --dark:      #1A1A1A;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
}

.page {
  background: var(--dark);
  padding: 40px 35px;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(201, 168, 76, 0.2);
  border: 1px solid rgba(201, 168, 76, 0.3);
  width: 100%;
  max-width: 400px;
}

h2 {
  text-align: center;
  color: var(--accent);
  margin-bottom: 25px;
  font-family: 'Times New Roman', Times, serif;
  font-size: 28px;
  letter-spacing: 1px;
}

.form-group {
  margin-bottom: 18px;
  text-align: left;
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: bold;
  color: var(--light);
  font-size: 14px;
  letter-spacing: 0.5px;
}

input {
  width: 100%;
  padding: 12px 15px;
  border: 1px solid rgba(201, 168, 76, 0.3);
  border-radius: 8px;
  font-size: 15px;
  background: #2a2a2a;
  color: var(--light);
  outline: none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  box-sizing: border-box;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: var(--accent);
  color: var(--dark);
  border: none;
  border-radius: 25px;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
  font-family: 'Times New Roman', Times, serif;
  transition: background 0.3s ease, box-shadow 0.3s ease;
  letter-spacing: 0.5px;
}


button:hover {
  background: #b8902e;
  box-shadow: 0 4px 14px rgba(201, 168, 76, 0.4);
}

#success-section {
  display: none;
  margin-top: 20px;
  text-align: center;
  color: var(--accent);
  font-weight: bold;
  font-size: 16px;
  letter-spacing: 0.5px;
}
  </style>
</head>
<body>
  <nav class="navbar">
  <div class="nav-logo">
    <img src="./img/new logo.png" alt="Logo" style="height: 55px;">
    <span class="nav-brand">SiyaraGo<span class="nav-brand-ext">.ma</span></span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="voiture.html">Voitures</a></li>
    <li><a href="reservation.html">Réserver</a></li>
    <li><a href="apropos.html">À propos</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  
</nav>

<div class="page ">
  <h2>Créer un compte</h2>

  <div id="form-section">
    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" placeholder="Votre prénom">
    </div>

    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" placeholder="Votre nom">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="exemple@gmail.com">
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="Mot de passe">
    </div>

    <div class="form-group">
      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="Répétez le mot de passe">
    </div>

    <button onclick="inscrire()">Créer mon compte</button>
  </div>

  <div id="success-section">
    <p id="success-msg"></p>
  </div>
</div>

<script>
function inscrire() {
  let prenom   = document.getElementById("prenom").value;
  let nom      = document.getElementById("nom").value;
  let email    = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let confirm  = document.getElementById("confirm").value;

 
  if (!prenom || !nom || !email || !password) {
    alert("Veuillez remplir tous les champs !");
    return;
  }
  if (password !== confirm) {
    alert("Les mots de passe ne correspondent pas !");
    return;
  }


  document.getElementById("form-section").style.display = "none";
  document.getElementById("success-section").style.display = "block";
  document.getElementById("success-msg").innerText = "Bienvenue " + prenom + " !";
}
</script>

</body>
</html>
