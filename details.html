<!DOCTYPE html>
<html id="details">
<head>
<meta charset="UTF-8">
<title>Détail</title>
<link rel="stylesheet" href="./css/style.css">


<style>
body { font-family: Arial; background: #eee; }

.card {
  width: 600px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

img { width: 100%; }

.spec { margin: 8px 0; }
</style>
</head>

<body>
  <nav class="navbar">
  <div class="nav-logo">
    <img src="./img/logo.png" alt="Logo" style="height: 55px;">
    <span class="nav-brand">SiyaraGo<span class="nav-brand-ext">.ma</span></span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="voiture.html">Voitures</a></li>
    <li><a href="reservation.html">Réserver</a></li>
    <li><a href="apropos.html">À propos</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="nav-buttons">
    <button class="btn-sincrire" onclick="window.location.href='inscription.html'">S'inscrire</button>
    <button class="btn-connexion"   onclick="window.location.href='connexion.html'">Connexion</button>
  </div>
</nav>

<div class="card">
  <img id="image">
  <h2 id="nom"></h2>
  <p id="prix"></p>

  <div class="spec">⚙️ Boîte: <span id="boite"></span></div>
  <div class="spec">⛽ Carburant: <span id="carburant"></span></div>
  <div class="spec">👥 Places: <span id="places"></span></div>
  <div class="spec">🧳 Coffre: <span id="coffre"></span></div>
  <div class="spec">💪 Puissance: <span id="puissance"></span></div>
</div>

<script>

const voiture = JSON.parse(localStorage.getItem("voiture"));

document.getElementById("nom").innerText = voiture.nom;
document.getElementById("prix").innerText = voiture.prix;
document.getElementById("image").src = voiture.image;

document.getElementById("boite").innerText = voiture.boite;
document.getElementById("carburant").innerText = voiture.carburant;
document.getElementById("places").innerText = voiture.places;
document.getElementById("coffre").innerText = voiture.coffre;
document.getElementById("puissance").innerText = voiture.puissance;
</script>

</body>
</html>
