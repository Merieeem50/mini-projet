<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion — SiyaraGo</title>
  <style>
    :root {
      --primary: #0D0D0D;
      --accent:  #C9A84C;
      --light:   #F7F5F0;
      --mid:     #6B6B6B;
      --dark:    #1A1A1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .navbar {
      width: calc(100% - 40px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--dark);
      padding: 16px 32px;
      margin: 20px;
      border-radius: 20px;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
      position: sticky;
      top: 10px;
      z-index: 1000;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-brand {
      font-size: 24px;
      font-weight: bold;
      color: var(--light);
    }

    .nav-brand-ext {
      color: var(--accent);
      font-size: 14px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 25px;
    }

    .nav-links a {
      color: var(--light);
      text-decoration: none;
      font-size: 16px;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }

    .nav-buttons { display: flex; gap: 10px; }

    .nav-buttons button {
      padding: 9px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      border: 2px solid var(--accent);
      transition: all 0.3s ease;
    }

    .nav-buttons button:first-child {
      background: transparent;
      color: var(--accent);
    }

    .nav-buttons button:first-child:hover {
      background: var(--accent);
      color: var(--primary);
    }

    .nav-buttons button:last-child {
      background: var(--accent);
      color: var(--primary);
    }

    .nav-buttons button:last-child:hover { background: #b8902e; }

   
    .login-card {
      width: 100%;
      max-width: 400px;
      margin: 40px auto 50px;
      background: var(--dark);
      padding: 40px 35px;
      border-radius: 16px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      box-shadow: 0 8px 30px rgba(201, 168, 76, 0.15);
    }

    .login-card h2 {
      text-align: center;
      color: var(--accent);
      font-family: 'Times New Roman', Times, serif;
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: var(--mid);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      color: var(--light);
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      background: #2a2a2a;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 8px;
      color: var(--light);
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      box-sizing: border-box;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
    }

    input::placeholder { color: var(--mid); }

    .input-wrapper { position: relative; }

    .input-wrapper input { padding-right: 44px; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 0;
      width: auto;
      margin: 0;
    }

    .toggle-pw:hover { background: none; box-shadow: none; }

    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: var(--accent);
      color: var(--dark);
      border: none;
      border-radius: 25px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Times New Roman', Times, serif;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-login:hover {
      background: #b8902e;
      box-shadow: 0 4px 14px rgba(201, 168, 76, 0.4);
    }

    .error-msg {
      display: none;
      background: rgba(201, 68, 68, 0.12);
      border: 1px solid rgba(201, 68, 68, 0.4);
      color: #e07070;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 14px;
      text-align: center;
    }

    .success-msg {
      display: none;
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid rgba(201, 168, 76, 0.4);
      color: var(--accent);
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      margin-top: 14px;
      text-align: center;
      font-weight: bold;
    }

    .divider {
      text-align: center;
      color: var(--mid);
      font-size: 13px;
      margin: 22px 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: rgba(201, 168, 76, 0.2);
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .links { text-align: center; }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      transition: opacity 0.3s;
    }

    .links a:hover { opacity: 0.75; }

    .links span {
      color: var(--mid);
      margin: 0 8px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-logo">
      <img src="./img/new logo.png" alt="Logo SiyaraGo" style="height: 46px;">
      <span class="nav-brand">SiyaraGo<span class="nav-brand-ext">.ma</span></span>
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="voiture.html">Voitures</a></li>
      <li><a href="reservation.html">Réserver</a></li>
      <li><a href="apropos.html">À propos</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <div class="nav-buttons">
      <button onclick="window.location.href='inscription.html'">S'inscrire</button>
      <button onclick="window.location.href='connexion.html'">Connexion</button>
    </div>
  </nav>

  <div class="login-card">
    <h2> Connexion</h2>
    <p class="subtitle">Content de vous revoir !</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="exemple@gmail.com">
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Votre mot de passe">
    </div>

    <button class="btn-login" onclick="connecter()">Se connecter</button>

    <div class="error-msg"   id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="divider">ou</div>

    <div class="links">
      <a href="inscription.html">Créer un compte</a>
      <span>|</span>
      <a href="#">Mot de passe oublié ?</a>
    </div>
  </div>

  <script>
    

    function connecter() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorDiv   = document.getElementById("error-msg");
      const successDiv = document.getElementById("success-msg");
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      errorDiv.style.display   = "none";
      successDiv.style.display = "none";

      if (!email || !password) {
        errorDiv.textContent   = " Veuillez remplir tous les champs !";
        errorDiv.style.display = "block";
        return;
      }

      if (!emailRegex.test(email)) {
        errorDiv.textContent   = " Email non valide !";
        errorDiv.style.display = "block";
        return;
      }

      if (password.length < 6) {
        errorDiv.textContent   = " Mot de passe trop court (min. 6 caractères) !";
        errorDiv.style.display = "block";
        return;
      }

      successDiv.innerHTML =
        " Connexion réussie !<br>" +
        "<a href='index.html' style='color:var(--accent);font-size:14px;" +
        "text-decoration:none;display:block;margin-top:10px;'>← Aller à l'accueil</a>";
      successDiv.style.display = "block";
    }
  </script>

</body>
</html>
