voitures.forEach(v => {
  liste.innerHTML += `
    <div class="car">
      <img src="${v.image}">
      <div class="car-info">
        <span class="badge">2024</span>
        <h3>${v.nom}</h3>
        <p class="prix">${v.prix}</p>

        <button onclick='goDetail(${JSON.stringify(v)})'>
          Voir détails
        </button>

      </div>
    </div>
  `;
});

/* navigation vers détail */
function goDetail(v){
  localStorage.setItem("voiture", JSON.stringify(v));
  window.location.href = "details.html";
}
