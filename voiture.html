<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Voitures</title>

<link rel="stylesheet" href="./css/style.css">


<style>
  
.cars {
  padding: 60px 40px;
  text-align: center;
}

.cars .sub {
  color: var(--oxblood);
  font-size: 28px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: bold;
}

.cars h2 {
  font-size: 45px;
  margin: 10px 0 35px;
  color: var(--obsidian);
  font-family: 'Times New Roman', Times, serif;
}


.cars-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  max-width: 1200px;
  margin: 0 auto;
}


.car {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.car:hover {
  transform: translateY(-6px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.car img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-bottom: 3px solid var(--oxblood);
}


.car-info {
  padding: 20px;
  text-align: center;
}

.car-info h3 {
  font-size: 22px;
  font-weight: bold;
  color: var(--obsidian);
  margin-bottom: 8px;
  font-family: 'Segoe UI', sans-serif;
}

.car-info .prix {
  font-size: 18px;
  font-weight: bold;
  color: var(--oxblood);
  margin-bottom: 15px;
}


.badge {
  display: inline-block;
  background: var(--oxblood);
  color: var(--plaster);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 10px;
}


.car-info button {
  padding: 12px 24px;
  background: var(--oxblood);
  color: var(--plaster);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  font-family: 'Times New Roman', Times, serif;
  transition: background 0.3s ease, box-shadow 0.3s ease;
}

.car-info button:hover {
  background: #7a2535;
  box-shadow: 0 4px 12px rgba(94, 30, 43, 0.35);
}
</style>

</head>

<body>


<nav class="navbar">
  <div class="nav-logo">
    <img src="./img/logo.png" alt="Logo" style="height: 55px;">
    <span class="nav-brand">
      SiyaraGo<span class="nav-brand-ext">.ma</span>
    </span>
  </div>

  <ul class="nav-links">
    <li><a href="index.html" class="active">Accueil</a></li>
    <li><a href="voiture.html">Voitures</a></li>
    <li><a href="reservation.html">Réserver</a></li>
    <li><a href="apropos.html">À propos</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>

  
</nav>


<div class="cars">
  <p class="sub">NOS VÉHICULES</p>
  <h2>Explorez Nos Voitures</h2>

  <div class="cars-row" id="liste"></div>
</div>


<script>


const voitures = [
  {
    nom: "Mercedes Benz 2024",

    boite: "Automatique",
    carburant: "Diesel",
    places: "5",
    coffre: "Grand",
    puissance: "190 ch"
  },
  {
    nom: "Toyota Yaris 2024",
    prix: "150 DH/jour",
    image: "https://images.unsplash.com/photo-1583267746897-2cf415887172?w=600",
    boite: "Manuelle",
    carburant: "Essence",
    places: "5",
    coffre: "Petit",
    puissance: "110 ch"
  },
  {
    nom: "BMW Série 3 2024",
    prix: "300 DH/jour",
    image: "https://unsplash.com/photos/a-black-car-parked-on-the-side-of-a-road-Hcg0hqn4SbU",
    boite: "Automatique",
    carburant: "Diesel",
    places: "5",
    coffre: "Grand",
    puissance: "184 ch"
  },
  {
    nom: "Dacia Logan 2024",

  {

const liste = document.getElementById("liste");

voitures.forEach(v => {
  liste.innerHTML += `
    <div class="car">
      <img src="${v.image}">
      <div class="car-info">
        <span class="badge">2024</span>
        <h3>${v.nom}</h3>
        <p class="prix">${v.prix}</p>

        <button onclick='goDetail(${JSON.stringify(v)})'>
          Voir détails
        </button>

      </div>
    </div>
  `;
});


function goDetail(v){
  localStorage.setItem("voitures", JSON.stringify(v));
  window.location.href = "details.html";
}

</script>

</body>
<script src="./js/script.js"></script>
</html>
