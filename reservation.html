<div class="container">

<h2>Réserver une voiture</h2>

<label>Choisir une voiture</label>
<select id="voiture">
  <option value="900">Mercedes Benz 2024 - 900 DH/jour</option>
  <option value="350">Toyota Yaris 2024 - 350 DH/jour</option>
  <option value="600">BMW Série 3 2024 - 600 DH/jour</option>
  <option value="250">Dacia Logan 2024 - 250 DH/jour</option>
  <option value="300">Renault Clio 2024 - 300 DH/jour</option>
  <option value="500">Hyundai Tucson 2024 - 500 DH/jour</option>
</select>

<p id="prixJour">Prix : 900 DH / jour</p>

<label>Ville de départ</label>
<select id="ville">
  <option value="">-- Choisir une ville --</option>
  <option>Casablanca</option>
  <option>Rabat</option>
  <option>Marrakech</option>
  <option>Agadir</option>
</select>

<label>Numéro de téléphone</label>
<input type="tel" id="telephone" placeholder="Ex: 06XXXXXXXX">

<label>Date de début</label>
<input type="date" id="debut">

<label>Date de fin</label>
<input type="date" id="fin">

<h3>Prix total : <span id="total">0</span> DH</h3>

<button onclick="calculer()">Calculer le prix</button>
<button onclick="confirmer()">Confirmer la réservation</button>

</div>

<script>


let today = new Date().toISOString().split("T")[0];
document.getElementById("debut").min = today;
document.getElementById("fin").min = today;

document.getElementById("voiture").addEventListener("change", function(){
  document.getElementById("prixJour").innerText =
    "Prix : " + this.value + " DH / jour";
});


function calculer(){

  let prix = parseInt(document.getElementById("voiture").value);
  let debut = document.getElementById("debut").value;
  let fin = document.getElementById("fin").value;

  if(!debut || !fin){
    alert("Veuillez remplir les dates !");
    return;
  }

  
  let date1 = new Date(debut);
  let date2 = new Date(fin);

  
  date1.setHours(0,0,0,0);
  date2.setHours(0,0,0,0);

  if(date2 <= date1){
    alert("La date de fin doit être après la date de début !");
    return;
  }


  let diff = (date2 - date1) / (1000 * 60 * 60 * 24);

  let total = diff * prix;

  document.getElementById("total").innerText = total;
}


function confirmer(){

  let ville = document.getElementById("ville").value;
  let tel = document.getElementById("telephone").value;
  let debut = document.getElementById("debut").value;
  let fin = document.getElementById("fin").value;
  let total = document.getElementById("total").innerText;

  if(ville === "" || tel === "" || debut === "" || fin === ""){
    alert("Veuillez remplir toutes les informations !");
    return;
  }

  if(!/^0[5-7][0-9]{8}$/.test(tel)){
    alert("Numéro de téléphone invalide !");
    return;
  }

  if(total == 0){
    alert("Veuillez calculer le prix !");
    return;
  }

  alert("✅ Votre réservation est enregistrée ! Merci pour votre confience 🥰");
}

</script>
